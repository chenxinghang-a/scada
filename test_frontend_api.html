<!DOCTYPE html>
<html>
<head>
    <title>前端API测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>前端API测试</h1>
    
    <div class="result" id="token-result">
        <strong>Token检查:</strong> <span id="token-status">检查中...</span>
    </div>
    
    <div class="result" id="api-result">
        <strong>API调用测试:</strong> <span id="api-status">检查中...</span>
    </div>
    
    <div class="result" id="data-result">
        <strong>数据解析测试:</strong> <span id="data-status">检查中...</span>
    </div>
    
    <div class="result" id="element-result">
        <strong>HTML元素检查:</strong> <span id="element-status">检查中...</span>
    </div>

    <script>
        // 测试1: 检查token
        const token = localStorage.getItem('auth_token');
        const tokenStatus = document.getElementById('token-status');
        if (token) {
            tokenStatus.textContent = `Token存在: ${token.substring(0, 20)}...`;
            tokenStatus.className = 'success';
        } else {
            tokenStatus.textContent = 'Token不存在';
            tokenStatus.className = 'error';
        }

        // 测试2: 调用API
        const API_BASE = '/api/industry40';
        async function testAPI() {
            const apiStatus = document.getElementById('api-status');
            try {
                const resp = await fetch(`${API_BASE}/overview`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (resp.status === 401) {
                    apiStatus.textContent = 'API返回401未授权';
                    apiStatus.className = 'error';
                    return null;
                }
                
                if (!resp.ok) {
                    apiStatus.textContent = `API错误: ${resp.status}`;
                    apiStatus.className = 'error';
                    return null;
                }
                
                const data = await resp.json();
                apiStatus.textContent = `API调用成功，状态: ${resp.status}`;
                apiStatus.className = 'success';
                return data;
            } catch (e) {
                apiStatus.textContent = `API调用失败: ${e.message}`;
                apiStatus.className = 'error';
                return null;
            }
        }

        // 测试3: 解析数据
        async function testData() {
            const dataStatus = document.getElementById('data-status');
            const data = await testAPI();
            
            if (!data) {
                dataStatus.textContent = '无数据可解析';
                dataStatus.className = 'error';
                return;
            }
            
            try {
                const healthScore = data.predictive_maintenance?.avg_health_score;
                const oee = data.oee?.avg_oee_percent;
                const power = data.energy?.total_power_kw;
                const carbon = data.energy?.carbon_emission_kg;
                
                dataStatus.innerHTML = `
                    健康评分: ${healthScore}<br>
                    OEE: ${oee}%<br>
                    功率: ${power} kW<br>
                    碳排放: ${carbon} kgCO₂
                `;
                dataStatus.className = 'success';
            } catch (e) {
                dataStatus.textContent = `数据解析失败: ${e.message}`;
                dataStatus.className = 'error';
            }
        }

        // 测试4: 检查HTML元素
        function testElements() {
            const elementStatus = document.getElementById('element-status');
            const elements = [
                { id: 'ov-health', name: '健康评分' },
                { id: 'ov-oee', name: 'OEE' },
                { id: 'ov-power', name: '功率' },
                { id: 'ov-carbon', name: '碳排放' }
            ];
            
            let results = [];
            elements.forEach(el => {
                const element = document.getElementById(el.id);
                if (element) {
                    results.push(`${el.name}元素存在`);
                } else {
                    results.push(`${el.name}元素不存在`);
                }
            });
            
            elementStatus.innerHTML = results.join('<br>');
            elementStatus.className = 'success';
        }

        // 执行测试
        window.addEventListener('DOMContentLoaded', () => {
            testData();
            testElements();
        });
    </script>
</body>
</html>
