# 报警配置
alarms:
  # 温度报警阈值
  temperature:
    high_high: 100.0
    high: 80.0
    low: 10.0
    low_low: 0.0
  
  # 压力报警阈值
  pressure:
    high_high: 1.0
    high: 0.8
    low: 0.1
    low_low: 0.0

# 数据质量配置
quality:
  # 通信超时（秒）
  communication_timeout: 10.0
  
  # 数据有效期（秒）
  data_expiry: 60.0
  
  # 坏数据标记
  bad_data_value: -9999.0
