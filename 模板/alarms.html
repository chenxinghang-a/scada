{% extends "base.html" %}

{% block title %}报警管理 - 工业SCADA系统{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card mb-3">
            <div class="card-header">
                <h5 class="card-title mb-0"><i class="bi bi-bell"></i> 报警统计</h5>
            </div>
            <div class="card-body">
                <div class="row text-center">
                    <div class="col-4">
                        <h3 id="total-alarms" class="text-primary">0</h3>
                        <small class="text-muted">总报警</small>
                    </div>
                    <div class="col-4">
                        <h3 id="unacknowledged-alarms" class="text-warning">0</h3>
                        <small class="text-muted">未确认</small>
                    </div>
                    <div class="col-4">
                        <h3 id="high-alarms" class="text-danger">0</h3>
                        <small class="text-muted">严重</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="col-md-8">
        <div class="card mb-3">
            <div class="card-header">
                <h5 class="card-title mb-0"><i class="bi bi-funnel"></i> 筛选条件</h5>
            </div>
            <div class="card-body">
                <form class="row g-3">
                    <div class="col-md-3">
                        <select id="alarm-device-filter" class="form-select">
                            <option value="">全部设备</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select id="alarm-level-filter" class="form-select">
                            <option value="">全部级别</option>
                            <option value="critical">严重</option>
                            <option value="warning">警告</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select id="alarm-status-filter" class="form-select">
                            <option value="">全部状态</option>
                            <option value="unacknowledged">未确认</option>
                            <option value="acknowledged">已确认</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button type="button" id="filter-btn" class="btn btn-primary">筛选</button>
                        <button type="button" id="refresh-btn" class="btn btn-secondary">刷新</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card mb-3">
            <div class="card-header">
                <h5 class="card-title mb-0"><i class="bi bi-list-ul"></i> 报警记录</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover" id="alarm-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>设备</th>
                                <th>参数</th>
                                <th>级别</th>
                                <th>报警信息</th>
                                <th>阈值</th>
                                <th>实际值</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="alarm-tbody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// 设备名缓存
let _alarmDeviceNames = {};

document.addEventListener('DOMContentLoaded', async function() {
    // 加载设备列表填充下拉框
    await loadAlarmDeviceList();
    loadAlarms();

    document.getElementById('filter-btn').addEventListener('click', loadAlarms);
    document.getElementById('refresh-btn').addEventListener('click', loadAlarms);
});

async function loadAlarmDeviceList() {
    try {
        const resp = await fetch('/api/devices', { headers: getAuthHeaders() });
        const data = await resp.json();
        const select = document.getElementById('alarm-device-filter');
        if (data.devices) {
            // 兼容数组和对象
            const devices = Array.isArray(data.devices) ? data.devices : Object.values(data.devices);
            devices.forEach(d => {
                const id = d.device_id || d.id;
                const name = d.name || id;
                _alarmDeviceNames[id] = name;
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = name;
                select.appendChild(opt);
            });
        }
    } catch (e) {
        console.warn('加载设备列表失败');
    }
}

async function loadAlarms() {
    const deviceFilter = document.getElementById('alarm-device-filter').value;
    const levelFilter = document.getElementById('alarm-level-filter').value;
    const statusFilter = document.getElementById('alarm-status-filter').value;

    let url = '/api/alarms?limit=200';
    if (deviceFilter) url += `&device_id=${deviceFilter}`;
    if (levelFilter) url += `&alarm_level=${levelFilter}`;

    try {
        const response = await fetch(url, { headers: getAuthHeaders() });
        const data = await response.json();
        let alarms = data.alarms || [];

        // 前端筛选状态（API 不一定支持 status 参数）
        if (statusFilter === 'unacknowledged') {
            alarms = alarms.filter(a => !a.acknowledged);
        } else if (statusFilter === 'acknowledged') {
            alarms = alarms.filter(a => a.acknowledged);
        }

        // 更新统计
        const allAlarms = data.alarms || [];
        document.getElementById('total-alarms').textContent = allAlarms.length;
        document.getElementById('unacknowledged-alarms').textContent = allAlarms.filter(a => !a.acknowledged).length;
        document.getElementById('high-alarms').textContent = allAlarms.filter(a => a.alarm_level === 'critical').length;

        const tbody = document.getElementById('alarm-tbody');
        if (alarms.length > 0) {
            tbody.innerHTML = alarms.map(a => {
                const time = new Date(a.timestamp).toLocaleString('zh-CN');
                const deviceName = _alarmDeviceNames[a.device_id] || a.device_id;
                const levelBadge = a.alarm_level === 'critical'
                    ? '<span class="badge bg-danger">严重</span>'
                    : '<span class="badge bg-warning text-dark">警告</span>';
                const statusBadge = a.acknowledged
                    ? '<span class="badge bg-success">已确认</span>'
                    : '<span class="badge bg-secondary">未确认</span>';
                const ackBtn = a.acknowledged
                    ? ''
                    : `<button class="btn btn-sm btn-outline-primary" onclick="acknowledgeAlarm('${a.alarm_id}','${a.device_id}','${a.register_name}')">确认</button>`;

                return `<tr>
                    <td>${time}</td>
                    <td>${deviceName}</td>
                    <td>${a.register_name || '-'}</td>
                    <td>${levelBadge}</td>
                    <td>${a.alarm_message || '-'}</td>
                    <td>${a.threshold != null ? parseFloat(a.threshold).toFixed(2) : '-'}</td>
                    <td>${a.actual_value != null ? parseFloat(a.actual_value).toFixed(2) : '-'}</td>
                    <td>${statusBadge}</td>
                    <td>${ackBtn}</td>
                </tr>`;
            }).join('');
        } else {
            tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted py-4">暂无报警记录</td></tr>';
        }
    } catch (error) {
        console.error('加载报警失败:', error);
    }
}

async function acknowledgeAlarm(alarmId, deviceId, registerName) {
    try {
        const response = await fetch(`/api/alarms/${alarmId}/acknowledge`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
            body: JSON.stringify({
                device_id: deviceId,
                register_name: registerName,
                acknowledged_by: 'operator'
            })
        });
        const data = await response.json();
        if (data.success) loadAlarms();
    } catch (error) {
        console.error('确认报警失败:', error);
    }
}
</script>
{% endblock %}
