  # ==================== 设备21: 研华ADAM-6060继电器输出模块 (Modbus TCP) ====================
  # 手册来源: 研华ADAM-6000系列用户手册
  # ADAM-6060: 6路继电器输出 + 6路数字量输入
  # 用于控制外部报警灯、蜂鸣器、电磁阀等执行器
  # 安装在车间配电柜内, 通过Modbus TCP控制
  # 继电器输出: Form A (常开), 触点容量250VAC/30VDC 3A
  - id: relay_output_01
    name: "研华ADAM-6060继电器模块"
    description: "报警输出控制 — 外部警灯/蜂鸣器/电磁阀"
    protocol: modbus_tcp
    host: "192.168.1.72"
    port: 502
    slave_id: 1
    enabled: true
    collection_interval: 1
    device_model: "ADAM-6060-AE"
    vendor: "研华科技 (Advantech)"

    registers:
      # --- 继电器输出 (线圈, 功能码05H/0FH) ---
      # 读取用功能码01H, 写入用05H(单个)或0FH(多个)
      # 值: 0=断开, 1=闭合
      - name: "relay_1"
        description: "继电器1 — 主报警红灯"
        address: 0
        length: 1
        data_type: uint16
        scale: 1.0
        offset: 0
        unit: ""
        access: "rw"

      - name: "relay_2"
        description: "继电器2 — 主报警蜂鸣器"
        address: 1
        length: 1
        data_type: uint16
        scale: 1.0
        offset: 0
        unit: ""
        access: "rw"

      - name: "relay_3"
        description: "继电器3 — 备用报警黄灯"
        address: 2
        length: 1
        data_type: uint16
        scale: 1.0
        offset: 0
        unit: ""
        access: "rw"

      - name: "relay_4"
        description: "继电器4 — 备用蜂鸣器"
        address: 3
        length: 1
        data_type: uint16
        scale: 1.0
        offset: 0
        unit: ""
        access: "rw"

      - name: "relay_5"
        description: "继电器5 — 电磁阀控制"
        address: 4
        length: 1
        data_type: uint16
        scale: 1.0
        offset: 0
        unit: ""
        access: "rw"

      - name: "relay_6"
        description: "继电器6 — 备用输出"
        address: 5
        length: 1
        data_type: uint16
        scale: 1.0
        offset: 0
        unit: ""
        access: "rw"

      # --- 数字量输入 (离散输入, 功能码02H) ---
      - name: "di_1"
        description: "数字输入1 — 急停按钮反馈"
        address: 0
        length: 1
        data_type: uint16
        scale: 1.0
        offset: 0
        unit: ""
        access: "r"

      - name: "di_2"
        description: "数字输入2 — 门禁开关"
        address: 1
        length: 1
        data_type: uint16
        scale: 1.0
        offset: 0
        unit: ""
        access: "r"

      - name: "di_3"
        description: "数字输入3 — 烟感报警"
        address: 2
        length: 1
        data_type: uint16
        scale: 1.0
        offset: 0
        unit: ""
        access: "r"

      - name: "di_4"
        description: "数字输入4 — 水浸报警"
        address: 3
        length: 1
        data_type: uint16
        scale: 1.0
        offset: 0
        unit: ""
        access: "r"

      - name: "di_5"
        description: "数字输入5 — 手动/自动切换"
        address: 4
        length: 1
        data_type: uint16
        scale: 1.0
        offset: 0
        unit: ""
        access: "r"

      - name: "di_6"
        description: "数字输入6 — 备用"
        address: 5
        length: 1
        data_type: uint16
        scale: 1.0
        offset: 0
        unit: ""
        access: "r"


