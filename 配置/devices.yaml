# ================================================================
# 设备配置文件 — 基于真实工业设备官方手册
#
# 所有寄存器地址、数据类型、缩放因子均来自官方通讯手册：
# - 正泰DTSU666：官方使用说明书 + Modbus RTU通讯协议
#   （三相四线，40001起始地址，整型+缩放因子）
# - 西门子S7-1200：TIA Portal V16 Modbus TCP Server配置手册
#   （MB_SERVER指令块映射DB数据块到保持寄存器）
# - 虹润NHR-5700：多回路数字显示控制仪使用说明书
#   （Modbus RTU, IEEE754 float32, 16路巡检）
# - 欧姆龙NX102：NJ/NX系列OPC UA用户手册 W588
#   （原生OPC UA, Sysmac Studio全局变量发布）
#
# 答辩说明：不接真设备时simulation_mode=True自动切换模拟数据
# 支持协议: modbus_tcp / modbus_rtu / opcua / mqtt / rest
# ================================================================

devices:

  # ==================== 设备1: 正泰DTSU666三相四线电能表 ====================
  # 手册来源: 正泰DTSU666.014使用说明书, Modbus RTU通讯协议
  # 寄存器格式: 保持寄存器(功能码03H), IEEE754 float32
  # 物理接口: RS-485 (9600bps, 8N2), 通过串口转TCP网关暴露为Modbus TCP
  # 从机地址: 1, 波特率: 9600bps
  # 官方手册: https://www.modbus.cn/10181.html
  # 注意: 三相表每相电压/电流各占2个寄存器(float32), 地址间隔2
  - id: power_meter_01
    name: "正泰DTSU666三相电能表"
    description: "配电室三相四线多功能电表"
    protocol: modbus_tcp
    host: "192.168.1.100"
    port: 502
    slave_id: 1
    enabled: true
    collection_interval: 5
    device_model: "CHINT DTSU666.014"
    vendor: "正泰电器"

    registers:
      # --- 电压 (float32, 单位V, 地址2000H起) ---
      # 官方手册: 2000H=A相, 三相表扩展地址间隔2
      - name: "voltage_a"
        description: "A相电压"
        address: 8192         # 2000H = 8192
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "V"

      - name: "voltage_b"
        description: "B相电压"
        address: 8194         # 2002H
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "V"

      - name: "voltage_c"
        description: "C相电压"
        address: 8196         # 2004H
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "V"

      # --- 电流 (float32, 单位A) ---
      - name: "current_a"
        description: "A相电流"
        address: 8198         # 2006H
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "A"

      - name: "current_b"
        description: "B相电流"
        address: 8200         # 2008H
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "A"

      - name: "current_c"
        description: "C相电流"
        address: 8202         # 200AH
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "A"

      # --- 功率 (float32, 单位kW/kvar/kVA) ---
      - name: "active_power"
        description: "总有功功率"
        address: 8204         # 200CH
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "kW"

      - name: "reactive_power"
        description: "总无功功率"
        address: 8206         # 200EH
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "kvar"

      - name: "apparent_power"
        description: "总视在功率"
        address: 8208         # 2010H
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "kVA"

      # --- 功率因数 (float32) ---
      - name: "power_factor"
        description: "总功率因数"
        address: 8210         # 2012H
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: ""

      # --- 频率 (float32, 单位Hz) ---
      - name: "frequency"
        description: "电网频率"
        address: 8212         # 2014H
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "Hz"

      # --- 电能 (float32, 单位kWh, 地址4000H起) ---
      - name: "total_energy"
        description: "正向有功总电能"
        address: 16384        # 4000H = 16384
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "kWh"

      - name: "reverse_energy"
        description: "反向有功总电能"
        address: 16386        # 4002H
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "kWh"


  # ==================== 设备2: 西门子S7-1200 PLC (Modbus TCP) ====================
  # 手册来源: 基于TIA博途V16的S7-1200 Modbus/TCP通讯快速入门
  # 配置方式: MB_SERVER指令块, 将DB数据块映射为Modbus保持寄存器
  # DB1存储工艺参数(温度/压力/流量/液位), DB100存储设备状态
  # 寄存器地址0=DB1.DBW0, 地址2=DB1.DBW4(REAL float32占2字)
  # S7-1200固件要求V4.4+, 最大8个Modbus连接
  - id: siemens_plc_01
    name: "西门子S7-1200 PLC"
    description: "生产线主控PLC — Modbus TCP服务端"
    protocol: modbus_tcp
    host: "192.168.1.50"
    port: 502
    slave_id: 1
    enabled: true
    collection_interval: 2
    device_model: "S7-1214C DC/DC/DC (6ES7214-1AG40-0XB0)"
    vendor: "西门子"
    firmware: "V4.4"

    registers:
      # --- DB1: 工艺参数 (REAL = IEEE754 float32, 占2个寄存器) ---
      - name: "temperature"
        description: "反应釜温度 (DB1, REAL, 偏移0.0)"
        address: 0           # DB1.DBW0
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "°C"

      - name: "pressure"
        description: "管道压力 (DB1, REAL, 偏移4.0)"
        address: 2           # DB1.DBW4
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "MPa"

      - name: "flow_rate"
        description: "流量 (DB1, REAL, 偏移8.0)"
        address: 4           # DB1.DBW8
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "m³/h"

      - name: "liquid_level"
        description: "液位 (DB1, REAL, 偏移12.0)"
        address: 6           # DB1.DBW12
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "m"

      - name: "motor_speed"
        description: "电机转速 (DB1, INT, 偏移16.0)"
        address: 8           # DB1.DBW16
        length: 1
        data_type: uint16
        scale: 1.0
        offset: 0
        unit: "RPM"

      - name: "motor_current"
        description: "电机电流 (DB1, REAL, 偏移18.0)"
        address: 9           # DB1.DBW18
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "A"

      - name: "running_status"
        description: "运行状态 (DB1, INT, 偏移22.0, 0=停机/1=运行/2=故障/3=维护)"
        address: 11          # DB1.DBW22
        length: 1
        data_type: uint16
        scale: 1.0
        offset: 0
        unit: ""

      - name: "alarm_code"
        description: "报警代码 (DB1, INT, 偏移24.0)"
        address: 12          # DB1.DBW24
        length: 1
        data_type: uint16
        scale: 1.0
        offset: 0
        unit: ""


  # ==================== 设备3: 欧姆龙NX102 PLC (OPC UA) ====================
  # 手册来源: 欧姆龙NJ/NX系列OPC UA用户手册 W588
  # 配置方式: Sysmac Studio定义全局变量 → 自动发布到OPC UA地址空间
  # 默认端口4840, 命名空间ns=2(NX内置), 变量名即NodeId
  # 需要固件V1.50+, 只有网口1支持OPC UA
  - id: omron_plc_01
    name: "欧姆龙NX102 PLC"
    description: "装配线控制 — OPC UA原生接口"
    protocol: opcua
    endpoint: "opc.tcp://192.168.1.51:4840"
    enabled: true
    collection_interval: 2
    device_model: "NX102-1200"
    vendor: "欧姆龙"
    firmware: "V1.50+"

    nodes:
      # Sysmac Studio中定义的全局变量路径:
      # 全局变量 → Program_名称.变量名 或 I/O映射中的变量
      # OPC UA NodeId格式: ns=2;s=变量路径
      - node_id: "ns=2;s=ProductionLine.ConveyorSpeed"
        name: "conveyor_speed"
        description: "传送带速度"
        unit: "m/min"

      - node_id: "ns=2;s=ProductionLine.ProductCount"
        name: "product_count"
        description: "产品计数"
        unit: "个"

      - node_id: "ns=2;s=ProductionLine.CycleTime"
        name: "cycle_time"
        description: "节拍时间"
        unit: "s"

      - node_id: "ns=2;s=AssemblyStation.Torque"
        name: "torque"
        description: "拧紧扭矩"
        unit: "N·m"

      - node_id: "ns=2;s=AssemblyStation.GoodCount"
        name: "good_count"
        description: "合格品计数"
        unit: "个"

      - node_id: "ns=2;s=AssemblyStation.NGCount"
        name: "ng_count"
        description: "不良品计数"
        unit: "个"


  # ==================== 设备4: 虹润NHR-5700温度巡检仪 (Modbus RTU转TCP) ====================
  # 手册来源: 虹润NHR-5700系列多回路数字显示控制仪使用说明书
  # 协议: Modbus RTU, 通过RS485转TCP网关暴露
  # 数据格式: IEEE754 float32, 高字节在前(Big-Endian)
  # 每个通道测量值占2个寄存器(4字节), 地址 = (通道号-1)×2
  # 16路巡检, 输入信号可通过面板按键设置(热电偶/热电阻/电压/电流)
  - id: temp_sensor_01
    name: "虹润NHR-5700温度巡检仪"
    description: "车间温度16路巡检 — 反应釜/冷却水/环境/电机"
    protocol: modbus_tcp
    host: "192.168.1.101"
    port: 502
    slave_id: 2
    enabled: true
    collection_interval: 5
    device_model: "NHR-5700-01-01"
    vendor: "虹润精密仪器"

    registers:
      # 功能码03H读保持寄存器, float32格式, 地址递增2
      - name: "temperature_ch1"
        description: "通道1 — 反应釜A"
        address: 0           # 通道1: 地址0×2=0
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "°C"

      - name: "temperature_ch2"
        description: "通道2 — 反应釜B"
        address: 2           # 通道2: 地址1×2=2
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "°C"

      - name: "temperature_ch3"
        description: "通道3 — 冷却水入口"
        address: 4
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "°C"

      - name: "temperature_ch4"
        description: "通道4 — 冷却水出口"
        address: 6
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "°C"

      - name: "temperature_ch5"
        description: "通道5 — 车间环境"
        address: 8
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "°C"

      - name: "temperature_ch6"
        description: "通道6 — 电机轴承"
        address: 10
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "°C"

      - name: "temperature_ch7"
        description: "通道7 — 管道"
        address: 12
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "°C"

      - name: "temperature_ch8"
        description: "通道8 — 储罐"
        address: 14
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "°C"


  # ==================== 设备5: IoT环境传感器 (MQTT) ====================
  # 基于ESP32-C3 + SHT40温湿度 + SCD41 CO2传感器的自研物联网节点
  # 话题格式: factory/{车间}/env/{参数}, JSON payload {"value": xxx}
  # QoS=1(至少一次), 通配订阅 factory/workshop_a/env/#
  - id: iot_sensor_01
    name: "IoT环境监测节点"
    description: "车间A无线环境监测 — 温湿度/CO2/PM2.5"
    protocol: mqtt
    host: "192.168.1.200"
    port: 1883
    username: "scada"
    password: "scada123"
    enabled: true
    collection_interval: 10
    device_model: "ESP32-C3 + SHT40 + SCD41"
    vendor: "自研物联网节点"

    topics:
      - topic: "factory/workshop_a/env/temperature"
        name: "temperature"
        unit: "°C"
        json_path: "value"
        description: "环境温度"

      - topic: "factory/workshop_a/env/humidity"
        name: "humidity"
        unit: "%RH"
        json_path: "value"
        description: "环境湿度"

      - topic: "factory/workshop_a/env/co2"
        name: "co2"
        unit: "ppm"
        json_path: "value"
        description: "CO2浓度"

      - topic: "factory/workshop_a/env/pm25"
        name: "pm25"
        unit: "μg/m³"
        json_path: "value"
        description: "PM2.5浓度"


  # ==================== 设备6: 西门子S7-1500 Web Server (REST) ====================
  # 手册来源: S7-1500系统手册 — 内置Web Server
  # S7-1500 V2.0+固件内置HTTP REST API, 无需额外模块
  # 访问地址: http://{IP}/api/v1/variables/{标签名}
  # 标签名对应TIA Portal中定义的PLC标签(Tag)
  # 需要在TIA Portal中启用Web Server并配置访问权限
  - id: siemens_web_01
    name: "西门子S7-1500 Web API"
    description: "S7-1500内置REST接口 — 备用数据通道"
    protocol: rest
    base_url: "http://192.168.1.52"
    poll_interval: 5
    auth_type: "basic"
    auth_username: "admin"
    auth_password: "admin123"
    enabled: true
    collection_interval: 5
    device_model: "S7-1516-3 PN/DP"
    vendor: "西门子"

    endpoints:
      - name: "ambient_temperature"
        path: "/api/v1/variables/DB1.temperature"
        method: GET
        json_path: "value"
        unit: "°C"

      - name: "system_pressure"
        path: "/api/v1/variables/DB1.pressure"
        method: GET
        json_path: "value"
        unit: "MPa"

      - name: "production_count"
        path: "/api/v1/variables/DB100.product_count"
        method: GET
        json_path: "value"
        unit: "个"

      - name: "line_status"
        path: "/api/v1/variables/DB100.line_status"
        method: GET
        json_path: "value"
        unit: ""


  # ==================== 设备7: 西门子S7-1500 PLC (Modbus TCP) ====================
  # 手册来源: S7-1500系统手册 + TIA Portal Modbus TCP配置指南
  # S7-1500比S7-1200更强：支持更多连接、更大DB块、高速采集
  # 用于主产线关键工艺参数采集（锅炉/换热器/反应釜群）
  - id: siemens_1500_01
    name: "西门子S7-1500 PLC"
    description: "主产线控制PLC — 锅炉/换热器/反应釜群"
    protocol: modbus_tcp
    host: "192.168.1.53"
    port: 502
    slave_id: 1
    enabled: true
    collection_interval: 2
    device_model: "S7-1516-3 PN/DP (6ES7516-3AN02-0AB0)"
    vendor: "西门子"
    firmware: "V2.9"

    registers:
      - name: "boiler_temperature"
        description: "锅炉出口温度"
        address: 0
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "°C"

      - name: "boiler_pressure"
        description: "锅炉压力"
        address: 2
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "MPa"

      - name: "heat_exchanger_temperature"
        description: "换热器出口温度"
        address: 4
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "°C"

      - name: "steam_flow"
        description: "蒸汽流量"
        address: 6
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "t/h"

      - name: "feed_water_level"
        description: "给水液位"
        address: 8
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "mm"

      - name: "flue_gas_temperature"
        description: "排烟温度"
        address: 10
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "°C"

      - name: "oxygen_content"
        description: "烟气含氧量"
        address: 12
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "%"

      - name: "boiler_status"
        description: "锅炉状态 0=停炉/1=运行/2=故障"
        address: 14
        length: 1
        data_type: uint16
        scale: 1.0
        offset: 0
        unit: ""


  # ==================== 设备8: 施耐德M340 PLC (Modbus RTU转TCP) ====================
  # 手册来源: Modicon M340 通讯协议手册 (Modbus RTU)
  # M340是施耐德中端PLC, 支持Unity Pro编程
  # 用于水处理车间(进水泵站/加药系统/沉淀池)
  # 通过BMX NOE 0100以太网模块暴露Modbus TCP
  - id: schneider_m340_01
    name: "施耐德M340 PLC"
    description: "水处理车间控制 — 进水/加药/沉淀"
    protocol: modbus_tcp
    host: "192.168.1.54"
    port: 502
    slave_id: 1
    enabled: true
    collection_interval: 5
    device_model: "BMX P34 2020 + BMX NOE 0100"
    vendor: "施耐德电气"
    firmware: "V3.30"

    registers:
      - name: "inlet_flow"
        description: "进水流量"
        address: 0
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "m³/h"

      - name: "outlet_flow"
        description: "出水流量"
        address: 2
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "m³/h"

      - name: "water_level"
        description: "沉淀池液位"
        address: 4
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "m"

      - name: "ph_value"
        description: "出水pH值"
        address: 6
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: ""

      - name: "turbidity"
        description: "出水浊度"
        address: 8
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "NTU"

      - name: "dissolved_oxygen"
        description: "溶解氧"
        address: 10
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "mg/L"

      - name: "conductivity"
        description: "电导率"
        address: 12
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "μS/cm"

      - name: "pump_speed"
        description: "进水泵转速"
        address: 14
        length: 1
        data_type: uint16
        scale: 1.0
        offset: 0
        unit: "RPM"


  # ==================== 设备9: ABB M4M电力仪表 (Modbus TCP) ====================
  # 手册来源: ABB M4M系列网络分析仪通讯手册
  # M4M是ABB新一代多功能电力仪表，支持THD谐波分析
  # 安装在车间配电柜，监测电机群供电质量
  - id: abb_m4m_01
    name: "ABB M4M电力分析仪"
    description: "车间配电柜 — 电力质量监测"
    protocol: modbus_tcp
    host: "192.168.1.102"
    port: 502
    slave_id: 1
    enabled: true
    collection_interval: 5
    device_model: "M4M 20"
    vendor: "ABB"

    registers:
      - name: "voltage_a"
        description: "A相电压"
        address: 0
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "V"

      - name: "voltage_b"
        description: "B相电压"
        address: 2
        length: 2
        data_type: float32
        scale: 1.0
        offset: 0
        unit: "V"

      - name: "voltage_c"
        description: "C相电压"
        address: 4
