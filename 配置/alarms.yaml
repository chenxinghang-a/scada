alarm_output:
  enabled: true
  relay_output:
    device_id: relay_output_01
    do_mapping:
      buzzer: 1
      red_light: 0
      solenoid_valve: 4
      spare: 5
      spare_buzzer: 3
      yellow_light: 2
    host: 192.168.1.72
    port: 502
    protocol: modbus_tcp
    slave_id: 1
  signal_tower:
    device_id: signal_tower_01
    do_mapping:
      blue_light: 3
      buzzer: 5
      buzzer_volume: 7
      flash_interval: 6
      green_light: 2
      red_light: 0
      white_light: 4
      yellow_light: 1
    host: 192.168.1.70
    port: 502
    protocol: modbus_tcp
    slave_id: 1
  station_output:
    device_id: relay_output_02
    do_mapping:
      corridor_light: 6
      master_buzzer: 7
      station_a_buzzer: 0
      station_a_green: 2
      station_a_red: 1
      station_b_buzzer: 3
      station_b_green: 5
      station_b_red: 4
    host: 192.168.1.73
    port: 502
    protocol: modbus_tcp
    slave_id: 2
alarm_rules:
- condition: greater_than
  delay: 0
  description: 锅炉出口温度超过上限
  device_id: siemens_1500_01
  enabled: true
  id: temp_high
  level: critical
  name: 锅炉温度过高
  register_name: boiler_temperature
  threshold: 180.0
- condition: less_than
  delay: 0
  description: 锅炉出口温度低于下限
  device_id: siemens_1500_01
  enabled: true
  id: temp_low
  level: warning
  name: 锅炉温度过低
  register_name: boiler_temperature
  threshold: 50.0
- condition: greater_than
  delay: 0
  description: 蒸馏塔顶温度超过上限
  device_id: hollysys_lk_01
  enabled: true
  id: env_temp_high
  level: warning
  name: 蒸馏塔温度过高
  register_name: distill_temperature
  threshold: 120.0
- condition: greater_than
  delay: 0
  description: 锅炉压力超过上限
  device_id: siemens_1500_01
  enabled: true
  id: pressure_high
  level: critical
  name: 锅炉压力过高
  register_name: boiler_pressure
  threshold: 1.2
- condition: less_than
  delay: 0
  description: 锅炉压力低于下限
  device_id: siemens_1500_01
  enabled: true
  id: pressure_low
  level: warning
  name: 锅炉压力过低
  register_name: boiler_pressure
  threshold: 0.2
- condition: greater_than
  delay: 0
  description: A相电压超过上限
  device_id: abb_m4m_01
  enabled: true
  id: voltage_high
  level: critical
  name: A相电压过高
  register_name: voltage_a
  threshold: 242.0
- condition: less_than
  delay: 0
  description: A相电压低于下限
  device_id: abb_m4m_01
  enabled: true
  id: voltage_low
  level: warning
  name: A相电压过低
  register_name: voltage_a
  threshold: 198.0
- condition: greater_than
  delay: 0
  description: A相电流超过上限
  device_id: abb_m4m_01
  enabled: true
  id: current_high
  level: critical
  name: A相电流过高
  register_name: current_a
  threshold: 100.0
- condition: less_than
  delay: 0
  description: 出水pH值低于下限
  device_id: schneider_m340_01
  enabled: true
  id: ph_low
  level: warning
  name: 出水pH过低
  register_name: ph_value
  threshold: 6.5
- condition: greater_than
  delay: 0
  description: 出水pH值超过上限
  device_id: schneider_m340_01
  enabled: true
  id: ph_high
  level: warning
  name: 出水pH过高
  register_name: ph_value
  threshold: 8.5
dedup:
  acknowledge_suppress_seconds: 600
  critical_toast_duration: 30
  emit_cooldown_seconds: 60
  enabled: true
  max_visible_toasts: 3
  warning_toast_duration: 10
notification:
  email:
    enabled: false
    password: ''
    recipients:
    - admin@example.com
    - engineer@example.com
    smtp_port: 587
    smtp_server: smtp.example.com
    username: ''
  sms:
    access_key: ''
    enabled: false
    phone_numbers:
    - '13800138000'
    provider: aliyun
    secret_key: ''
    sign_name: ''
    template_code: ''
  sound:
    critical_sound: alarm_critical.mp3
    enabled: true
    warning_sound: alarm_warning.mp3
