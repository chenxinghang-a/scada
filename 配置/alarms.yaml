# 报警配置文件
# 配置报警规则和通知方式

# 报警级别
# - critical: 严重报警，需要立即处理
# - warning: 警告报警，需要关注
# - info: 信息提示，仅记录

alarm_rules:
  # 温度报警规则（模拟数据范围20-35°C）
  - id: temp_high
    name: "温度过高"
    description: "温度超过上限"
    device_id: temp_sensor_01
    register_name: "temperature"
    condition: "greater_than"
    threshold: 32.0  # 调整到32度，模拟数据会触发
    level: "critical"
    enabled: true
    delay: 0  # 立即确认
    
  - id: temp_low
    name: "温度过低"
    description: "温度低于下限"
    device_id: temp_sensor_01
    register_name: "temperature"
    condition: "less_than"
    threshold: 22.0  # 调整到22度，模拟数据会触发
    level: "warning"
    enabled: true
    delay: 0
    
  # 压力报警规则（模拟数据范围0.3-0.7 MPa）
  - id: pressure_high
    name: "压力过高"
    description: "压力超过上限"
    device_id: pressure_sensor_01
    register_name: "pressure"
    condition: "greater_than"
    threshold: 0.65  # 调整到0.65，模拟数据会触发
    level: "critical"
    enabled: true
    delay: 0
    
  - id: pressure_low
    name: "压力过低"
    description: "压力低于下限"
    device_id: pressure_sensor_01
    register_name: "pressure"
    condition: "less_than"
    threshold: 0.35  # 调整到0.35，模拟数据会触发
    level: "warning"
    enabled: true
    delay: 0
    
  # 电力报警规则（电压220±10，电流50-70）
  - id: voltage_high
    name: "电压过高"
    description: "电压超过上限"
    device_id: power_meter_01
    register_name: "voltage"
    condition: "greater_than"
    threshold: 225.0  # 调整到225，模拟数据偶尔触发
    level: "critical"
    enabled: true
    delay: 0
    
  - id: voltage_low
    name: "电压过低"
    description: "电压低于下限"
    device_id: power_meter_01
    register_name: "voltage"
    condition: "less_than"
    threshold: 215.0  # 调整到215，模拟数据偶尔触发
    level: "warning"
    enabled: true
    delay: 0
    
  - id: current_high
    name: "电流过高"
    description: "电流超过上限"
    device_id: power_meter_01
    register_name: "current"
    condition: "greater_than"
    threshold: 65.0  # 调整到65，模拟数据会触发
    level: "critical"
    enabled: true
    delay: 0

# 通知配置
notification:
  # 邮件通知
  email:
    enabled: false
    smtp_server: "smtp.example.com"
    smtp_port: 587
    username: ""
    password: ""
    recipients:
      - "admin@example.com"
      - "engineer@example.com"
    
  # 短信通知（示例）
  sms:
    enabled: false
    provider: "aliyun"
    access_key: ""
    secret_key: ""
    sign_name: ""
    template_code: ""
    phone_numbers:
      - "13800138000"
    
  # 声音报警
  sound:
    enabled: true
    critical_sound: "alarm_critical.mp3"
    warning_sound: "alarm_warning.mp3"

# ==================== 声光报警输出设备配置 ====================
# 关联devices.yaml中的灯控和蜂鸣器设备
alarm_output:
  enabled: true

  # 主报警灯塔 — Patlite LR7信号灯塔 (1号线)
  signal_tower:
    device_id: "signal_tower_01"
    protocol: modbus_tcp
    host: "192.168.1.70"
    port: 502
    slave_id: 1
    # 寄存器地址映射（对应devices.yaml中的定义）
    do_mapping:
      red_light: 0       # 红色灯 — 故障/紧急停止
      yellow_light: 1    # 黄色灯 — 警告/待料
      green_light: 2     # 绿色灯 — 正常运行
      blue_light: 3      # 蓝色灯 — 待机/呼叫
      white_light: 4     # 白色灯 — 维护模式
      buzzer: 5          # 蜂鸣器 — 报警/呼叫
      flash_interval: 6  # 闪烁周期 (ms)
      buzzer_volume: 7   # 蜂鸣器音量 (%)

  # 备用报警输出 — 研华ADAM-6060继电器模块
  relay_output:
    device_id: "relay_output_01"
    protocol: modbus_tcp
    host: "192.168.1.72"
    port: 502
    slave_id: 1
    # 继电器映射
    do_mapping:
      red_light: 0       # 继电器1 — 主报警红灯
      buzzer: 1          # 继电器2 — 主报警蜂鸣器
      yellow_light: 2    # 继电器3 — 备用报警黄灯
      spare_buzzer: 3    # 继电器4 — 备用蜂鸣器
      solenoid_valve: 4  # 继电器5 — 电磁阀控制
      spare: 5           # 继电器6 — 备用输出

  # 工位级报警 — 微雪8路继电器模块
  station_output:
    device_id: "relay_output_02"
    protocol: modbus_tcp
    host: "192.168.1.73"
    port: 502
    slave_id: 2
    do_mapping:
      station_a_buzzer: 0   # 工位A蜂鸣器
      station_a_red: 1      # 工位A红灯
      station_a_green: 2    # 工位A绿灯
      station_b_buzzer: 3   # 工位B蜂鸣器
      station_b_red: 4      # 工位B红灯
      station_b_green: 5    # 工位B绿灯
      corridor_light: 6     # 走廊警灯
      master_buzzer: 7      # 总蜂鸣器
