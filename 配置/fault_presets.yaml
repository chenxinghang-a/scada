# 故障预设场景配置
# 用于快速注入常见故障场景进行测试

# 故障场景定义
scenarios:
  # 传感器漂移场景
  sensor_drift:
    name: "传感器漂移"
    description: "模拟传感器读数逐渐偏移，常见于老化传感器"
    fault_type: "sensor_drift"
    severity: 0.6
    duration_seconds: 300  # 持续5分钟
    affected_registers:
      - "boiler_temperature"
      - "heat_exchanger_temperature"
      - "distill_temperature"
    symptoms:
      - "读数缓慢上升或下降"
      - "与实际值偏差逐渐增大"
      - "其他传感器读数正常"

  # 过热故障场景
  overheating:
    name: "设备过热"
    description: "模拟设备温度异常升高，需要紧急处理"
    fault_type: "overheating"
    severity: 0.8
    duration_seconds: 120  # 持续2分钟
    affected_registers:
      - "boiler_temperature"
      - "flue_gas_temperature"
      - "heat_exchanger_temperature"
    symptoms:
      - "温度快速上升"
      - "超过安全阈值"
      - "可能触发高温报警"

  # 压力泄漏场景
  pressure_leak:
    name: "压力泄漏"
    description: "模拟管道或容器压力泄漏"
    fault_type: "pressure_leak"
    severity: 0.7
    duration_seconds: 180  # 持续3分钟
    affected_registers:
      - "boiler_pressure"
      - "system_pressure"
      - "distill_pressure"
    symptoms:
      - "压力逐渐下降"
      - "流量异常"
      - "可能需要停机检修"

  # 电机磨损场景
  motor_wear:
    name: "电机磨损"
    description: "模拟电机轴承磨损导致的性能下降"
    fault_type: "motor_wear"
    severity: 0.5
    duration_seconds: 600  # 持续10分钟
    affected_registers:
      - "motor_speed"
      - "motor_current"
      - "vibration_x"
      - "vibration_y"
      - "vibration_z"
    symptoms:
      - "振动增大"
      - "电流波动"
      - "转速不稳定"

  # 通信故障场景
  communication:
    name: "通信故障"
    description: "模拟设备通信中断或不稳定"
    fault_type: "communication"
    severity: 0.9
    duration_seconds: 60  # 持续1分钟
    affected_registers: []  # 影响所有寄存器
    symptoms:
      - "数据读取失败"
      - "响应超时"
      - "连接断开"

  # 电源波动场景
  power_fluctuation:
    name: "电源波动"
    description: "模拟电源电压不稳定"
    fault_type: "power_fluctuation"
    severity: 0.4
    duration_seconds: 240  # 持续4分钟
    affected_registers:
      - "voltage_a"
      - "voltage_b"
      - "voltage_c"
      - "power_factor"
    symptoms:
      - "电压波动"
      - "功率因数下降"
      - "设备运行不稳定"

  # 复合故障场景 - 锅炉事故
  boiler_accident:
    name: "锅炉事故"
    description: "模拟锅炉系统多重故障，用于应急演练"
    fault_type: "overheating"
    severity: 1.0
    duration_seconds: 90  # 持续1.5分钟
    affected_registers:
      - "boiler_temperature"
      - "boiler_pressure"
      - "steam_flow"
      - "feed_water_level"
    symptoms:
      - "温度急剧上升"
      - "压力异常"
      - "水位下降"
      - "需要紧急停机"

  # 复合故障场景 - 化工车间泄漏
  chemical_leak:
    name: "化工车间泄漏"
    description: "模拟化工车间管道泄漏事故"
    fault_type: "pressure_leak"
    severity: 0.85
    duration_seconds: 150  # 持续2.5分钟
    affected_registers:
      - "distill_pressure"
      - "distill_temperature"
      - "dryer_humidity"
      - "reflux_ratio"
    symptoms:
      - "压力下降"
      - "温度异常"
      - "湿度变化"
      - "需要紧急处理"

  # 复合故障场景 - 注塑机故障
  injection_mold_fault:
    name: "注塑机故障"
    description: "模拟注塑机模具故障"
    fault_type: "motor_wear"
    severity: 0.7
    duration_seconds: 200  # 持续3.3分钟
    affected_registers:
      - "injection_pressure"
      - "injection_speed"
      - "mold_temperature"
      - "barrel_temperature"
      - "clamping_force"
    symptoms:
      - "注射压力波动"
      - "速度不稳定"
      - "温度异常"
      - "锁模力下降"

  # 复合故障场景 - 电力系统故障
  power_system_fault:
    name: "电力系统故障"
    description: "模拟配电系统异常"
    fault_type: "power_fluctuation"
    severity: 0.6
    duration_seconds: 180  # 持续3分钟
    affected_registers:
      - "voltage_a"
      - "voltage_b"
      - "voltage_c"
      - "current_a"
      - "current_b"
      - "current_c"
      - "active_power"
      - "power_factor"
    symptoms:
      - "三相电压不平衡"
      - "电流异常"
      - "功率因数下降"
      - "可能触发保护"

# 故障严重程度说明
severity_levels:
  0.1: "极轻微 - 几乎无影响"
  0.2: "很轻微 - 轻微波动"
  0.3: "轻微 - 可观察到变化"
  0.4: "较轻 - 需要关注"
  0.5: "中等 - 需要监控"
  0.6: "较重 - 需要处理"
  0.7: "严重 - 需要立即处理"
  0.8: "很严重 - 可能停机"
  0.9: "极严重 - 紧急状态"
  1.0: "灾难性 - 立即停机"

# 故障类型说明
fault_types:
  sensor_drift:
    name: "传感器漂移"
    description: "传感器读数逐渐偏移，常见于老化传感器"
    typical_duration: "5-30分钟"
    recovery: "自动恢复或更换传感器"

  overheating:
    name: "过热故障"
    description: "设备温度异常升高"
    typical_duration: "1-5分钟"
    recovery: "冷却后检查散热系统"

  pressure_leak:
    name: "压力泄漏"
    description: "管道或容器压力泄漏"
    typical_duration: "持续直到修复"
    recovery: "修复泄漏点"

  motor_wear:
    name: "电机磨损"
    description: "电机轴承磨损导致性能下降"
    typical_duration: "持续恶化"
    recovery: "更换轴承或电机"

  communication:
    name: "通信故障"
    description: "设备通信中断或不稳定"
    typical_duration: "瞬时或持续"
    recovery: "检查网络和连接"

  power_fluctuation:
    name: "电源波动"
    description: "电源电压不稳定"
    typical_duration: "1-10分钟"
    recovery: "电源恢复后自动恢复"
