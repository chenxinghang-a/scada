alarm:
  check_interval: 10
  confirm_timeout: 300
  escalation_time: 600
collection:
  default_interval: 5
  max_concurrent: 10
  retry:
    interval_seconds: 5
    max_attempts: 3
  timeout: 10
database:
  compression:
    enabled: true
    interval_hours: 24
    method: average
  path: data/scada.db
  retention:
    alarm_days: 90
    compressed_data_days: 365
    raw_data_days: 30
  type: sqlite
export:
  directory: exports
  formats:
  - csv
  - excel
  - json
  max_rows: 100000
logging:
  console:
    enabled: true
  file:
    backup_count: 5
    enabled: true
    max_size_mb: 10
    path: logs/scada.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: DEBUG
performance:
  cache:
    enabled: true
    ttl_seconds: 300
    type: memory
  connection_pool:
    size: 10
    timeout: 30
system:
  author: 陈星行
  description: 基于Python的工业数据采集与监控系统（四层漏斗架构）
  name: 工业数据采集与监控系统
  version: 2.0.0
web:
  cors:
    enabled: true
    origins:
    - '*'
  debug: true
  host: 0.0.0.0
  port: 5000
  secret_key: industrial-scada-secret-key
