# 能源管理配置文件
# 电价、碳排放因子、能效基线等参数
# 支持通过前端界面动态调整

# 分时电价配置 (元/kWh)
tariff:
  peak: 1.2      # 峰时电价
  flat: 0.7      # 平时电价
  valley: 0.35   # 谷时电价

# 峰谷平时段定义 (24小时制)
# peak: 峰时段, valley: 谷时段, 其余为平时段
tariff_periods:
  peak:
    - [8, 11]    # 8:00-11:00
    - [18, 23]   # 18:00-23:00
  valley:
    - [0, 7]     # 00:00-07:00
    - [23, 24]   # 23:00-24:00

# 碳排放因子 (kgCO2/kWh)
# 中国电网平均排放因子约0.5810 tCO2/MWh (2023年)
carbon_factor: 0.581

# 能耗异常检测阈值
anomaly:
  # 超过基线的倍数触发报警
  threshold_multiplier: 2.0
  # 警告阈值
  warning_multiplier: 1.5
