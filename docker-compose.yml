version: "3.8"

services:
  # ========== SCADA 主应用 ==========
  scada:
    build: .
    container_name: scada-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - SCADA_MODE=simulated
      - MQTT_BROKER=emqx
      - MQTT_PORT=1883
      - TDENGINE_HOST=tdengine
      - TDENGINE_PORT=6041
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    volumes:
      - scada-data:/app/data
      - scada-logs:/app/logs
    depends_on:
      emqx:
        condition: service_healthy
      tdengine:
        condition: service_healthy
    networks:
      - scada-net

  # ========== EMQX MQTT Broker ==========
  emqx:
    image: emqx/emqx:5.6.1
    container_name: scada-emqx
    restart: unless-stopped
    ports:
      - "1883:1883"    # MQTT
      - "8083:8083"    # WebSocket
      - "18083:18083"  # Dashboard
    environment:
      - EMQX_NAME=scada
      - EMQX_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
    networks:
      - scada-net

  # ========== TDengine 时序数据库 ==========
  tdengine:
    image: tdengine/tdengine:3.3.2.0
    container_name: scada-tdengine
    restart: unless-stopped
    ports:
      - "6030:6030"    # native
      - "6041:6041"    # REST
      - "6043:6043"    # taosAdapter
    environment:
      - TAOS_FQDN=tdengine
    healthcheck:
      test: ["CMD", "taos", "-s", "SELECT server_version()"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - tdengine-data:/var/lib/taos
      - tdengine-log:/var/log/taos
    networks:
      - scada-net

  # ========== nginx 反向代理 ==========
  nginx:
    image: nginx:1.25-alpine
    container_name: scada-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - scada
    networks:
      - scada-net

  # ========== Grafana 可视化 ==========
  grafana:
    image: grafana/grafana:10.4.2
    container_name: scada-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=tdengine-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - tdengine
    networks:
      - scada-net

volumes:
  scada-data:
  scada-logs:
  emqx-data:
  emqx-log:
  tdengine-data:
  tdengine-log:
  grafana-data:

networks:
  scada-net:
    driver: bridge
