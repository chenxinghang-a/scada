worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 日志格式
    log_format scada '$remote_addr - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent"';

    # 限流（防暴力攻击）
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    upstream scada_backend {
        server scada:5000;
    }

    server {
        listen 80;
        server_name _;

        access_log /var/log/nginx/scada_access.log scada;
        error_log  /var/log/nginx/scada_error.log warn;

        # 安全头
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;

        # 静态资源（由 Flask 提供，nginx 缓存）
        location /静态资源/ {
            proxy_pass http://scada_backend;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        # WebSocket
        location /socket.io/ {
            proxy_pass http://scada_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
        }

        # API 接口（限流）
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://scada_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 默认路由
        location / {
            proxy_pass http://scada_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
